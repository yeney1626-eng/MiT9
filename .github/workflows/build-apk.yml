name: Build Installable APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Generate Documents
        run: ./gradlew generateDocs

      - name: Validate Dictionaries
        run: ./gradlew validateLanguages

      - name: Build Languages
        run: ./gradlew buildDefinition buildDictionaryDownloads

      - name: Copy Downloads
        run: ./gradlew copyDownloadsToAssets

      - name: Build debug APK (installable, unsigned-debug-key)
        run: ./gradlew assembleLiteDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiTi9-debug-apk
          path: app/build/outputs/apk/**/*.apk
